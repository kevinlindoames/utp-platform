version: '3.8'
services:
  postgres:
    command: postgres -c 'max_connections=200'
    image: postgres:15
    container_name: utp-postgres
    environment:
      POSTGRES_USER: utpuser
      POSTGRES_PASSWORD: utppass
      POSTGRES_DB: utpdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: utp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: